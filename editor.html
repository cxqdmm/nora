<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>关卡编辑器 — 毛毛虫找家</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; height: 100vh; background: #1a1a2e; font-family: 'Microsoft YaHei', sans-serif; color: #e0e0e0; overflow: hidden; }

    /* ── 顶部工具栏 ── */
    #toolbar { display: flex; align-items: center; gap: 4px; background: #16213e; padding: 8px 16px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    #toolbar h1 { font-size: 15px; color: #e94560; margin-right: 16px; white-space: nowrap; }
    .tool-sep { width: 1px; height: 28px; background: #0f3460; margin: 0 6px; }

    /* 可拖拽工具项 */
    .tool-item {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 6px;
      border: 1px solid #0f3460; background: #1a1a2e; color: #e0e0e0;
      cursor: grab; font-size: 13px; user-select: none;
      transition: background 0.12s, border-color 0.12s;
    }
    .tool-item:hover { background: #0f3460; border-color: #e94560; color: #fff; }
    .tool-item:active { cursor: grabbing; }
    .tool-item .icon { font-size: 16px; }
    .tool-item .label { font-size: 12px; }

    /* 拖拽幽灵 */
    #ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: #e94560; color: #fff; padding: 6px 14px; border-radius: 8px;
      font-size: 13px; white-space: nowrap; opacity: 0.92;
      display: none; transform: translate(-50%, -50%);
      box-shadow: 0 4px 16px rgba(233,69,96,0.4);
    }

    /* ── 主内容区 ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* 画布 */
    #canvas-wrap {
      flex: 0 0 800px; position: relative; overflow: hidden;
      border-right: 1px solid #0f3460;
    }
    #canvas-wrap.drag-over { outline: 2px dashed #e94560; outline-offset: -4px; background: rgba(233,69,96,0.03); }
    #coord-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(22,33,62,0.85); padding: 4px 12px; font-size: 12px; color: #aaa; pointer-events: none; z-index: 10; }
    #mode-bar { position: absolute; top: 0; left: 0; right: 0; background: rgba(22,33,62,0.88); padding: 5px 12px; font-size: 12px; color: #e94560; pointer-events: none; z-index: 10; text-align: center; }

    /* 垃圾桶 */
    #trash-zone {
      position: absolute; bottom: 36px; right: 8px;
      width: 60px; height: 60px; border-radius: 12px;
      background: rgba(233,69,96,0.08); border: 2px dashed rgba(233,69,96,0.5);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 24px; color: rgba(233,69,96,0.5);
      transition: all 0.2s; z-index: 20;
    }
    #trash-zone span { font-size: 10px; margin-top: 2px; }
    #trash-zone.hover { opacity: 1 !important; background: rgba(233,69,96,0.3); border-color: #e94560; border-style: solid; color: #fff; transform: scale(1.1); }

    /* 右侧面板 */
    #panel { flex: 1; background: #16213e; display: flex; flex-direction: column; overflow: hidden; }
    .tabs { display: flex; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    .tab { padding: 8px 12px; cursor: pointer; font-size: 13px; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: #e94560; border-bottom-color: #e94560; }
    .tab-content { flex: 1; overflow-y: auto; padding: 12px; display: none; }
    .tab-content.active { display: block; }
    .section-title { font-size: 11px; color: #e94560; margin: 10px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
    .prop-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 13px; }
    .prop-label { color: #aaa; min-width: 52px; }
    input[type="text"], input[type="number"], select { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; padding: 4px 8px; font-size: 13px; width: 100%; }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: #e94560; }
    .node-list, .edge-list, .item-list { display: flex; flex-direction: column; gap: 3px; }
    .list-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: #1a1a2e; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .list-item.selected { background: #0f3460; border: 1px solid #e94560; }
    .list-item .del { margin-left: auto; color: #888; cursor: pointer; font-size: 14px; }
    .list-item .del:hover { color: #e94560; }
    .npc-card { background: #1a1a2e; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
    .npc-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

    /* Toast */
    #toast { position: fixed; bottom: 20px; right: 20px; background: #e94560; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; }

    /* 导入 */
    #import-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
    #import-modal.show { display: flex; }
    .modal-box { background: #16213e; border-radius: 10px; padding: 20px; width: 500px; }
    .modal-box h3 { color: #e94560; margin-bottom: 12px; }
    .modal-box textarea { width: 100%; height: 200px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; padding: 8px; font-family: monospace; font-size: 12px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .btn { padding: 6px 14px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #0f3460; }
    .btn.primary { background: #0f3460; color: #e94560; font-weight: bold; }

    /* 食物类型弹出 */
    #type-popup { position: fixed; background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 8px; z-index: 200; display: none; min-width: 130px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .type-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #e0e0e0; }
    .type-opt:hover { background: #0f3460; color: #fff; }
    .type-opt.selected { background: #e94560; color: #fff; }
  </style>
</head>
<body>

<!-- ── 工具栏 ── -->
<div id="toolbar">
  <h1>关卡编辑器</h1>

  <!-- 节点：可拖入画布 -->
  <div class="tool-item" id="tool-node">
    <span class="icon">⚫</span><span class="label">节点</span>
  </div>

  <div class="tool-sep"></div>

  <!-- 边：可拖入画布 -->
  <div class="tool-item" id="tool-edge">
    <span class="icon">━━</span><span class="label">边</span>
  </div>

  <!-- 快速通道 -->
  <div class="tool-item" id="tool-fasttravel">
    <span class="icon">⚡</span><span class="label">快速通道</span>
  </div>

  <!-- NPC -->
  <div class="tool-item" id="tool-npc">
    <span class="icon">🐸</span><span class="label">NPC</span>
  </div>

  <div class="tool-sep"></div>

  <!-- 食物：拖入节点上 -->
  <div class="tool-item" id="tool-food">
    <span class="icon">🍎</span><span class="label">食物</span>
  </div>

  <!-- 翅膀：拖入节点上 -->
  <div class="tool-item" id="tool-wing">
    <span class="icon">🪁</span><span class="label">翅膀</span>
  </div>

  <div class="tool-sep"></div>
  <button class="btn primary" id="btn-export">📤 导出</button>
  <button class="btn" id="btn-import">📥 导入</button>
</div>

<!-- 拖拽幽灵 -->
<div id="ghost"></div>

<!-- ── 主内容 ── -->
<div id="main">

  <div id="canvas-wrap">
    <div id="game-container"></div>
    <div id="mode-bar">拖拽上方工具到画布放置</div>
    <div id="coord-bar">就绪</div>
    <div id="trash-zone">🗑<span>删除</span></div>
  </div>

  <!-- 右侧面板 -->
  <div id="panel">
    <div class="tabs">
      <div class="tab active" data-tab="nodes">节点</div>
      <div class="tab" data-tab="edges">边</div>
      <div class="tab" data-tab="items">道具</div>
      <div class="tab" data-tab="npcs">NPC</div>
      <div class="tab" data-tab="meta">基础</div>
    </div>

    <div class="tab-content active" id="tab-nodes">
      <div class="section-title">节点列表（点击选中，拖动移动）</div>
      <div class="node-list" id="node-list"></div>
      <div class="section-title">属性</div>
      <div class="prop-row"><label class="prop-label">id</label><input id="p-id" type="text" readonly></div>
      <div class="prop-row"><label class="prop-label">x</label><input id="p-x" type="number"></div>
      <div class="prop-row"><label class="prop-label">y</label><input id="p-y" type="number"></div>
      <div class="prop-row"><label class="prop-label">标签</label><input id="p-label" type="text"></div>
      <div class="prop-row"><label><input id="p-start" type="checkbox"> 起点</label></div>
      <div class="prop-row"><label><input id="p-home" type="checkbox"> 终点</label></div>
      <div class="prop-row"><label><input id="p-dead" type="checkbox"> 死路</label></div>
    </div>

    <div class="tab-content" id="tab-edges">
      <div class="section-title">所有边（拖入画布创建）</div>
      <div class="edge-list" id="edge-list"></div>
    </div>

    <div class="tab-content" id="tab-items">
      <div class="section-title">食物</div>
      <div class="item-list" id="food-list"></div>
      <div class="section-title">翅膀</div>
      <div class="item-list" id="wing-list"></div>
      <div class="section-title">快速通道</div>
      <div class="item-list" id="ft-list"></div>
    </div>

    <div class="tab-content" id="tab-npcs">
      <div class="section-title">NPC 列表</div>
      <div id="npc-cards"></div>
    </div>

    <div class="tab-content" id="tab-meta">
      <div class="prop-row"><label class="prop-label">名称</label><input id="m-name" type="text"></div>
      <div class="prop-row"><label class="prop-label">难度</label>
        <select id="m-diff"><option value="简单">简单</option><option value="普通">普通</option><option value="困难">困难</option></select>
      </div>
      <div class="prop-row"><label class="prop-label">初始能量</label><input id="m-energy" type="number"></div>
      <div class="prop-row"><label class="prop-label">起点节点</label><select id="m-start"></select></div>
      <div class="prop-row"><label class="prop-label">终点节点</label><select id="m-home"></select></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="type-popup">
  <div class="type-opt" data-v="leaf">🍃 Leaf</div>
  <div class="type-opt" data-v="berry">🫐 Berry</div>
  <div class="type-opt" data-v="apple">🍎 Apple</div>
</div>
<div id="import-modal">
  <div class="modal-box">
    <h3>导入 JSON</h3>
    <textarea id="import-text" placeholder="粘贴 JSON 内容..."></textarea>
    <div class="modal-actions">
      <button class="btn" id="import-cancel">取消</button>
      <button class="btn primary" id="import-confirm">导入</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  数据模型
// ══════════════════════════════════════════════
class EditorLevel {
  constructor() {
    this.d = { id:1, name:'', difficulty:'简单', startNode:-1, homeNode:-1,
      initialEnergy:120, nodes:[], edges:[], food:[], wings:[], fastTravel:[], npcs:[] };
  }
  addNode(x, y) {
    const id = this.d.nodes.length ? Math.max(...this.d.nodes.map(n=>n.id))+1 : 0;
    this.d.nodes.push({ id, x, y, isStart:false, isHome:false, isDead:false, label:'' });
    return id;
  }
  removeNode(id) {
    this.d.nodes = this.d.nodes.filter(n=>n.id!==id);
    this.d.edges = this.d.edges.filter(([a,b])=>a!==id&&b!==id);
    this.d.food  = this.d.food.filter(f=>f.nodeId!==id);
    this.d.wings = this.d.wings.filter(w=>w.nodeId!==id);
    this.d.fastTravel = this.d.fastTravel.filter(([a,b])=>a!==id&&b!==id);
    this.d.npcs = this.d.npcs.filter(n=>n.edgeA!==id&&n.edgeB!==id);
    if(this.d.startNode===id) this.d.startNode=-1;
    if(this.d.homeNode===id) this.d.homeNode=-1;
  }
  updateNode(id, f) {
    const n = this.d.nodes.find(n=>n.id===id); if(!n) return;
    Object.assign(n, f);
    if(f.isStart){ this.d.nodes.forEach(n2=>n2.id!==id&&(n2.isStart=false)); this.d.startNode=id; }
    if(f.isHome) { this.d.nodes.forEach(n2=>n2.id!==id&&(n2.isHome=false)); this.d.homeNode=id; }
  }
  getNode(id) { return this.d.nodes.find(n=>n.id===id); }
  getNodeAt(x, y, r=16) { for(const n of this.d.nodes) if(Math.hypot(n.x-x,n.y-y)<=r) return n; return null; }
  addEdge(a, b) {
    if(a===b) return false;
    if(this.d.edges.some(([x,y])=>(x===a&&y===b)||(x===b&&y===a))) return false;
    this.d.edges.push([a,b]); return true;
  }
  removeEdge(a,b) { this.d.edges=this.d.edges.filter(([x,y])=>!(x===a&&y===b)&&!(x===b&&y===a)); }
  getEdgeAt(x,y) {
    for(const [a,b] of this.d.edges){
      const na=this.getNode(a), nb=this.getNode(b);
      if(!na||!nb) continue;
      const dx=nb.x-na.x, dy=nb.y-na.y, len=Math.hypot(dx,dy);
      if(!len) continue;
      const t=Math.max(0,Math.min(1,((x-na.x)*dx+(y-na.y)*dy)/(len*len)));
      if(Math.hypot(x-(na.x+t*dx),y-(na.y+t*dy))<8) return [a,b];
    }
    return null;
  }
  addFood(nid,t='leaf'){ if(!this.d.food.some(f=>f.nodeId===nid)) this.d.food.push({nodeId:nid,type:t}); }
  removeFood(nid){ this.d.food=this.d.food.filter(f=>f.nodeId!==nid); }
  cycleFood(nid){
    const ts=['leaf','berry','apple'], i=this.d.food.findIndex(f=>f.nodeId===nid);
    if(i>=0){ const cur=this.d.food[i].type, next=ts[(ts.indexOf(cur)+1)%ts.length];
      if(next==='leaf') this.removeFood(nid); else this.d.food[i].type=next; }
    else this.d.food.push({nodeId:nid,type:'leaf'});
  }
  addWing(nid){ if(!this.d.wings.some(w=>w.nodeId===nid)) this.d.wings.push({nodeId:nid}); }
  removeWing(nid){ this.d.wings=this.d.wings.filter(w=>w.nodeId!==nid); }
  hasWing(nid){ return this.d.wings.some(w=>w.nodeId===nid); }
  toggleWing(nid){ this.hasWing(nid)?this.removeWing(nid):this.addWing(nid); }
  addFT(a,b){
    if(a===b) return false;
    if(this.d.fastTravel.some(([x,y])=>(x===a&&y===b)||(x===b&&y===a))) return false;
    this.d.fastTravel.push([a,b]); return true;
  }
  removeFT(a,b){ this.d.fastTravel=this.d.fastTravel.filter(([x,y])=>!(x===a&&y===b)&&!(x===b&&y===a)); }
  addNPC(eA,eB){ const id='npc_'+Date.now(); this.d.npcs.push({id,type:'frog',edgeA:eA,edgeB:eB,sneakEnergyCost:20}); return id; }
  removeNPC(id){ this.d.npcs=this.d.npcs.filter(n=>n.id!==id); }
  updateNPC(id,f){ const n=this.d.npcs.find(n=>n.id===id); if(n) Object.assign(n,f); }
  toJSON(){ return JSON.parse(JSON.stringify(this.d)); }
  fromJSON(o){ this.d=JSON.parse(JSON.stringify(o)); }
}

const level = new EditorLevel();

// ══════════════════════════════════════════════
//  全局状态
// ══════════════════════════════════════════════
let selId = null;          // 选中的节点 id
let edSc = null;           // Phaser 场景
const CW=800, CH=600, NR=14;

// 连接模式（从节点拖出创建边/快速通道/NPC）
const conn = { active:false, tool:null, fromId:null, cx:0, cy:0 };
// 节点移动
const mv = { active:false, node:null, ox:0, oy:0 };
// 工具栏拖拽
const td = { active:false, tool:null, el:null };

// ══════════════════════════════════════════════
//  Phaser
// ══════════════════════════════════════════════
new Phaser.Game({ type:Phaser.AUTO, width:CW, height:CH, parent:'game-container', backgroundColor:'#87CEEB', scene:{ create } });

function create() {
  edSc = this;
  this.add.graphics().fillGradientStyle(0x87CEEB,0x87CEEB,0xB0E0E6,0xB0E0E6,1).fillRect(0,0,CW,CH);
  const g=this.add.graphics(); g.fillStyle(0x4a9e30,0.55);
  for(let i=0;i<20;i++){ const bx=30+i*40; g.fillTriangle(bx,CH,bx-12,CH-30,bx+12,CH-30); }
  edSc.edgeGfx=this.add.graphics(); edSc.ftGfx=this.add.graphics();
  edSc.nodeGfx=this.add.graphics(); edSc.lblGfx=this.add.graphics();
  edSc.ovGfx=this.add.graphics(); edSc.foodGfx=this.add.graphics();
  this.input.on('pointerdown', onDown, this);
  this.input.on('pointermove', onMove, this);
  this.input.on('pointerup',   onUp,   this);
  bindPanel();
  updateAll();
  redraw();
}

// ══════════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════════
function redraw() {
  if(!edSc) return;
  edSc.children.list.filter(c=>c.getData&&c.getData('fl')).forEach(c=>c.destroy());
  edSc.edgeGfx.clear(); edSc.ftGfx.clear(); edSc.nodeGfx.clear();
  edSc.lblGfx.clear(); edSc.ovGfx.clear(); edSc.foodGfx.clear();

  // 边
  for(const [a,b] of level.d.edges){
    const na=level.getNode(a), nb=level.getNode(b);
    if(!na||!nb) continue;
    edSc.edgeGfx.lineStyle(6,0x6d4c2f,1); edSc.edgeGfx.beginPath(); edSc.edgeGfx.moveTo(na.x,na.y); edSc.edgeGfx.lineTo(nb.x,nb.y); edSc.edgeGfx.strokePath();
    edSc.edgeGfx.lineStyle(3,0x5a3e1b,1); edSc.edgeGfx.beginPath(); edSc.edgeGfx.moveTo(na.x,na.y); edSc.edgeGfx.lineTo(nb.x,nb.y); edSc.edgeGfx.strokePath();
  }

  // 快速通道
  for(const [a,b] of level.d.fastTravel){
    const na=level.getNode(a), nb=level.getNode(b);
    if(!na||!nb) continue;
    const dx=nb.x-na.x, dy=nb.y-na.y, total=Math.hypot(dx,dy);
    if(!total) continue;
    const ux=dx/total, uy=dy/total;
    let d=0, on=true;
    edSc.ftGfx.lineStyle(3,0xffd700,0.7);
    while(d<total){
      const seg=on?12:8;
      edSc.ftGfx.beginPath();
      edSc.ftGfx.moveTo(na.x+ux*d,na.y+uy*d);
      edSc.ftGfx.lineTo(na.x+ux*Math.min(d+seg,total),na.y+uy*Math.min(d+seg,total));
      edSc.ftGfx.strokePath();
      d+=seg; on=!on;
    }
  }

  // 节点
  for(const n of level.d.nodes){
    const c=n.isStart?0x4CAF50:n.isHome?0xFF5722:n.isDead?0x9e9e9e:0x8d6e63;
    edSc.nodeGfx.fillStyle(0x000000,0.2); edSc.nodeGfx.fillCircle(n.x+2,n.y+2,NR);
    edSc.nodeGfx.fillStyle(c,1); edSc.nodeGfx.fillCircle(n.x,n.y,NR);
    edSc.nodeGfx.lineStyle(2,0xffffff,0.5); edSc.nodeGfx.strokeCircle(n.x,n.y,NR);
    edSc.lblGfx.fillStyle(0x000000,0.7); edSc.lblGfx.fillCircle(n.x,n.y,7);
    edSc.lblGfx.fillStyle(0xffffff,1); edSc.lblGfx.fillCircle(n.x,n.y,5);
  }

  // 食物
  for(const f of level.d.food){
    const n=level.getNode(f.nodeId); if(!n) continue;
    const cols={leaf:0x4CAF50,berry:0xE91E63,apple:0xF44336};
    edSc.foodGfx.fillStyle(cols[f.type]??0x4CAF50,0.9); edSc.foodGfx.fillCircle(n.x,n.y-22,9);
    const t=edSc.add.text(n.x+12,n.y-22,f.type,{fontSize:'10px',color:'#fff',backgroundColor:'#333',padding:{x:3,y:1}}).setOrigin(0,0.5).setDepth(100);
    t.setData('fl',true);
  }

  // 翅膀
  for(const w of level.d.wings){
    const n=level.getNode(w.nodeId); if(!n) continue;
    edSc.foodGfx.fillStyle(0x9C27B0,0.8); edSc.foodGfx.fillEllipse(n.x,n.y-38,18,12);
    edSc.foodGfx.fillStyle(0xE1BEE7,0.6); edSc.foodGfx.fillEllipse(n.x,n.y-38,12,7);
  }

  // NPC
  for(const npc of level.d.npcs){
    const na=level.getNode(npc.edgeA), nb=level.getNode(npc.edgeB);
    if(!na||!nb) continue;
    const mx=(na.x+nb.x)/2, my=(na.y+nb.y)/2;
    edSc.foodGfx.fillStyle(0x388e3c,1); edSc.foodGfx.fillEllipse(mx,my,22,18);
    edSc.foodGfx.fillStyle(0x81c784,1); edSc.foodGfx.fillEllipse(mx,my+4,14,11);
    edSc.foodGfx.fillStyle(0xffffff,1); edSc.foodGfx.fillCircle(mx-7,my-9,6); edSc.foodGfx.fillCircle(mx+7,my-9,6);
    edSc.foodGfx.fillStyle(0x1b5e20,1); edSc.foodGfx.fillCircle(mx-7,my-9,3); edSc.foodGfx.fillCircle(mx+7,my-9,3);
  }

  // 选中高亮
  if(selId!==null){
    const n=level.getNode(selId);
    if(n){ edSc.ovGfx.lineStyle(3,0xe94560,1); edSc.ovGfx.strokeCircle(n.x,n.y,20); edSc.ovGfx.lineStyle(2,0xe94560,0.25); edSc.ovGfx.fillCircle(n.x,n.y,24); }
  }

  // 连接橡皮筋
  if(conn.active&&conn.fromId!==null){
    const from=level.getNode(conn.fromId);
    if(from){
      const col=conn.tool==='fasttravel'?0xffd700:0x4CAF50;
      edSc.ovGfx.lineStyle(3,col,0.85); edSc.ovGfx.beginPath(); edSc.ovGfx.moveTo(from.x,from.y); edSc.ovGfx.lineTo(conn.cx,conn.cy); edSc.ovGfx.strokePath();
      edSc.ovGfx.lineStyle(2,col,0.6); edSc.ovGfx.strokeCircle(conn.cx,conn.cy,10);
    }
  }

  // 连接第一点提示
  if(conn.active&&conn.fromId===null){
    // 等待选择第一点
  }
}

// ══════════════════════════════════════════════
//  鼠标交互
// ══════════════════════════════════════════════
function onDown(pointer) {
  const wx=pointer.x, wy=pointer.y;
  const node=level.getNodeAt(wx,wy);

  // 连接模式中（边/快速通道/NPC）
  if(conn.active){
    if(node){
      if(conn.fromId===null){
        // 选择第一点
        conn.fromId=node.id;
        select(node.id);
      } else if(node.id!==conn.fromId){
        // 选择第二点 → 创建
        if(conn.tool==='edge')      level.addEdge(conn.fromId,node.id);
        else if(conn.tool==='fasttravel') level.addFT(conn.fromId,node.id);
        else if(conn.tool==='npc')  level.addNPC(conn.fromId,node.id);
        conn.active=false; conn.tool=null; conn.fromId=null;
        updateAll(); redraw(); updateModeBar();
      }
    } else {
      // 点空白 → 取消
      conn.active=false; conn.tool=null; conn.fromId=null;
      redraw(); updateModeBar();
    }
    return;
  }

  // 节点移动
  if(node){
    select(node.id);
    mv.active=true; mv.node=node; mv.ox=wx-node.x; mv.oy=wy-node.y;
    document.getElementById('p-x').value=Math.round(node.x);
    document.getElementById('p-y').value=Math.round(node.y);
    updateCoord(node.x,node.y);
    redraw();
  } else {
    select(null);
    document.getElementById('coord-bar').textContent='就绪';
    redraw();
  }
}

function onMove(pointer) {
  const wx=pointer.x, wy=pointer.y;

  if(mv.active&&mv.node){
    mv.node.x=Math.max(NR,Math.min(CW-NR,wx-mv.ox));
    mv.node.y=Math.max(NR,Math.min(CH-NR,wy-mv.oy));
    document.getElementById('p-x').value=Math.round(mv.node.x);
    document.getElementById('p-y').value=Math.round(mv.node.y);
    updateCoord(mv.node.x,mv.node.y);
    redraw();
  }

  if(conn.active){
    conn.cx=Math.max(0,Math.min(CW,wx));
    conn.cy=Math.max(0,Math.min(CH,wy));
    redraw();
  }
}

function onUp() {
  if(mv.active){ mv.active=false; mv.node=null; }
}

// ══════════════════════════════════════════════
//  工具栏拖拽
// ══════════════════════════════════════════════
const GHOST = document.getElementById('ghost');
const NAMES = { node:'⚫ 节点', edge:'━━ 边', fasttravel:'⚡ 快速通道', npc:'🐸 NPC', food:'🍎 食物', wing:'🪁 翅膀' };

document.querySelectorAll('.tool-item').forEach(el => {
  const tool = el.id.replace('tool-','');

  el.addEventListener('mousedown', e => {
    e.preventDefault();
    td.active=true; td.tool=tool; td.el=el;
    el.classList.add('dragging');
    GHOST.textContent = NAMES[tool];
    GHOST.style.display = 'block';
    moveGhost(e.clientX, e.clientY);
  });
});

document.addEventListener('mousemove', e => {
  if(td.active) moveGhost(e.clientX, e.clientY);

  // 垃圾桶高亮
  const rect = document.getElementById('trash-zone').getBoundingClientRect();
  const onTrash = e.clientX>=rect.left&&e.clientX<=rect.right&&e.clientY>=rect.top&&e.clientY<=rect.bottom;
  document.getElementById('trash-zone').classList.toggle('hover', onTrash);
});

document.addEventListener('mouseup', e => {
  if(!td.active){ tdReset(); return; }

  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const onCanvas = e.clientX>=rect.left&&e.clientX<=rect.right&&e.clientY>=rect.top&&e.clientY<=rect.bottom;

  if(onCanvas){
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const targetNode = level.getNodeAt(cx, cy);

    if(td.tool==='node'){
      // 直接在画布位置创建节点
      const id = level.addNode(cx, cy);
      select(id); updateAll(); redraw();

    } else if(td.tool==='edge'||td.tool==='fasttravel'||td.tool==='npc'){
      // 激活连接模式
      conn.active=true; conn.tool=td.tool; conn.fromId=null;
      conn.cx=cx; conn.cy=cy;
      updateModeBar();

    } else if(td.tool==='food'){
      if(targetNode){
        level.cycleFood(targetNode.id);
        select(targetNode.id); updateAll(); redraw();
      } else {
        toast('请将食物拖到节点上');
      }

    } else if(td.tool==='wing'){
      if(targetNode){
        level.toggleWing(targetNode.id);
        select(targetNode.id); updateAll(); redraw();
      } else {
        toast('请将翅膀拖到节点上');
      }
    }
  }

  tdReset();
  updateModeBar();
});

function moveGhost(x, y){ GHOST.style.left=x+'px'; GHOST.style.top=y+'px'; }

function tdReset(){
  td.active=false; td.tool=null;
  document.querySelectorAll('.tool-item').forEach(e=>e.classList.remove('dragging'));
  GHOST.style.display='none';
}

// 垃圾桶
document.addEventListener('mouseup', e => {
  const rect = document.getElementById('trash-zone').getBoundingClientRect();
  const onTrash = e.clientX>=rect.left&&e.clientX<=rect.right&&e.clientY>=rect.top&&e.clientY<=rect.bottom;
  if(!onTrash) return;
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const cx=e.clientX-r.left, cy=e.clientY-r.top;
  const node = level.getNodeAt(cx,cy,30);
  if(node){ level.removeNode(node.id); if(selId===node.id) select(null); updateAll(); redraw(); return; }
  const edge = level.getEdgeAt(cx,cy);
  if(edge){ level.removeEdge(edge[0],edge[1]); updateAll(); redraw(); }
});

// 右键取消连接模式
document.addEventListener('contextmenu', e => {
  e.preventDefault();
  if(conn.active){ conn.active=false; conn.tool=null; conn.fromId=null; redraw(); updateModeBar(); }
});

// ══════════════════════════════════════════════
//  模式提示栏
// ══════════════════════════════════════════════
function updateModeBar(){
  const bar = document.getElementById('mode-bar');
  if(conn.active){
    const msgs = { edge:'请选择边的终点节点（右键取消）', fasttravel:'请选择快速通道的终点节点（右键取消）', npc:'请选择 NPC 的终点节点（右键取消）' };
    if(conn.fromId===null) bar.textContent = '请选择起点节点';
    else bar.textContent = msgs[conn.tool] || '';
  } else {
    bar.textContent = '拖拽上方工具到画布放置';
  }
}

// ══════════════════════════════════════════════
//  选中 + 面板
// ══════════════════════════════════════════════
function select(id){
  selId = id;
  if(id!==null) updProps();
  refNodeList();
  redraw();
}

function updateAll(){
  refNodeList(); refEdgeList(); refFoodList(); refWingList(); refFTList(); refNPCList(); refMeta();
}

function updateCoord(x,y){ document.getElementById('coord-bar').textContent=`x:${Math.round(x)}  y:${Math.round(y)}`; }

// ── 节点列表 ──
function refNodeList(){
  const list=document.getElementById('node-list');
  list.innerHTML=level.d.nodes.length?'':'<div style="color:#555;font-size:12px">无节点</div>';
  for(const n of level.d.nodes){
    const div=document.createElement('div');
    div.className='list-item'+(selId===n.id?' selected':'');
    const tags=[n.isStart?'🏁':'',n.isHome?'🏠':'',n.isDead?'💀':''].filter(Boolean).join(' ');
    div.textContent=`节点 ${n.id} (${Math.round(n.x)},${Math.round(n.y)}) ${tags}`;
    div.addEventListener('click',()=>select(n.id));
    list.appendChild(div);
  }
}

// ── 属性 ──
function updProps(){
  const n=level.getNode(selId);
  if(!n){ ['p-id','p-x','p-y','p-label'].forEach(i=>document.getElementById(i).value=''); ['p-start','p-home','p-dead'].forEach(i=>document.getElementById(i).checked=false); return; }
  document.getElementById('p-id').value=n.id;
  document.getElementById('p-x').value=Math.round(n.x);
  document.getElementById('p-y').value=Math.round(n.y);
  document.getElementById('p-label').value=n.label;
  document.getElementById('p-start').checked=n.isStart;
  document.getElementById('p-home').checked=n.isHome;
  document.getElementById('p-dead').checked=n.isDead;
}

// ── 边列表 ──
function refEdgeList(){
  const list=document.getElementById('edge-list');
  list.innerHTML=level.d.edges.length?'':'<div style="color:#555;font-size:12px">无边</div>';
  for(const [a,b] of level.d.edges){
    const div=document.createElement('div'); div.className='list-item';
    div.innerHTML=`<span>${a} ↔ ${b}</span><span class="del">✕</span>`;
    div.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();level.removeEdge(a,b);refEdgeList();redraw();});
    list.appendChild(div);
  }
}

// ── 食物 ──
function refFoodList(){
  const list=document.getElementById('food-list');
  const emo={leaf:'🍃',berry:'🫐',apple:'🍎'};
  list.innerHTML=level.d.food.length?'':'<div style="color:#555;font-size:12px">无食物</div>';
  for(const f of level.d.food){
    const div=document.createElement('div'); div.className='list-item';
    div.innerHTML=`<span>${emo[f.type]} 节点${f.nodeId}: ${f.type}</span><span class="del">✕</span>`;
    div.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();level.removeFood(f.nodeId);refFoodList();redraw();});
    list.appendChild(div);
  }
}

// ── 翅膀 ──
function refWingList(){
  const list=document.getElementById('wing-list');
  list.innerHTML=level.d.wings.length?'':'<div style="color:#555;font-size:12px">无翅膀</div>';
  for(const w of level.d.wings){
    const div=document.createElement('div'); div.className='list-item';
    div.innerHTML=`<span>🪁 节点 ${w.nodeId}</span><span class="del">✕</span>`;
    div.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();level.removeWing(w.nodeId);refWingList();redraw();});
    list.appendChild(div);
  }
}

// ── 快速通道 ──
function refFTList(){
  const list=document.getElementById('ft-list');
  list.innerHTML=level.d.fastTravel.length?'':'<div style="color:#555;font-size:12px">无快速通道</div>';
  for(const [a,b] of level.d.fastTravel){
    const div=document.createElement('div'); div.className='list-item';
    div.innerHTML=`<span>⚡ [${a} ↔ ${b}]</span><span class="del">✕</span>`;
    div.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();level.removeFT(a,b);refFTList();redraw();});
    list.appendChild(div);
  }
}

// ── NPC ──
function refNPCList(){
  const c=document.getElementById('npc-cards');
  c.innerHTML=level.d.npcs.length?'':'<div style="color:#555;font-size:12px">无 NPC</div>';
  for(const npc of level.d.npcs){
    const card=document.createElement('div'); card.className='npc-card';
    card.innerHTML=`
      <div class="npc-card-header"><span>🐸 ${npc.id}</span><span class="del" style="color:#e94560;cursor:pointer;">✕ 删除</span></div>
      <div class="prop-row"><label class="prop-label">edgeA</label><select data-npc="${npc.id}" data-f="edgeA">${nOpts(npc.edgeA)}</select></div>
      <div class="prop-row"><label class="prop-label">edgeB</label><select data-npc="${npc.id}" data-f="edgeB">${nOpts(npc.edgeB)}</select></div>
      <div class="prop-row"><label class="prop-label">能量消耗</label><input type="number" value="${npc.sneakEnergyCost}" data-npc="${npc.id}" data-f="sneakEnergyCost"></div>
    `;
    card.querySelectorAll('select').forEach(s=>s.addEventListener('change',e=>{level.updateNPC(e.target.dataset.npc,{[e.target.dataset.f]:parseInt(e.target.value)};redraw();}));
    card.querySelectorAll('input').forEach(i=>i.addEventListener('change',e=>{level.updateNPC(e.target.dataset.npc,{[e.target.dataset.f]:parseInt(e.target.value)};}));
    card.querySelector('.del').addEventListener('click',()=>{level.removeNPC(npc.id);refNPCList();redraw();});
    c.appendChild(card);
  }
}

function nOpts(sel=-1){ let s='<option value="-1">—</option>'; for(const n of level.d.nodes) s+=`<option value="${n.id}"${n.id===sel?' selected':''}>节点 ${n.id}</option>`; return s; }

// ── 基础 ──
function refMeta(){
  document.getElementById('m-name').value=level.d.name;
  document.getElementById('m-diff').value=level.d.difficulty;
  document.getElementById('m-energy').value=level.d.initialEnergy;
  document.getElementById('m-start').innerHTML=nOpts(level.d.startNode);
  document.getElementById('m-home').innerHTML=nOpts(level.d.homeNode);
}

function refNodeSelects(){
  document.getElementById('m-start').innerHTML=nOpts(level.d.startNode);
  document.getElementById('m-home').innerHTML=nOpts(level.d.homeNode);
  refNPCList();
}

// ══════════════════════════════════════════════
//  面板事件
// ══════════════════════════════════════════════
function bindPanel(){
  ['p-x','p-y','p-label'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>{
      if(selId===null) return;
      level.updateNode(selId,{
        x:parseFloat(document.getElementById('p-x').value)||0,
        y:parseFloat(document.getElementById('p-y').value)||0,
        label:document.getElementById('p-label').value,
      });
      refNodeList(); redraw();
    });
  });
  ['p-start','p-home','p-dead'].forEach(id=>{
    document.getElementById(id).addEventListener('change',()=>{
      if(selId===null) return;
      level.updateNode(selId,{
        isStart:document.getElementById('p-start').checked,
        isHome:document.getElementById('p-home').checked,
        isDead:document.getElementById('p-dead').checked,
      });
      refNodeList(); refNodeSelects(); redraw();
    });
  });
  document.getElementById('m-name').addEventListener('input',e=>{ level.d.name=e.target.value; });
  document.getElementById('m-diff').addEventListener('change',e=>{ level.d.difficulty=e.target.value; });
  document.getElementById('m-energy').addEventListener('change',e=>{ level.d.initialEnergy=parseInt(e.target.value)||120; });
  document.getElementById('m-start').addEventListener('change',e=>{ const id=parseInt(e.target.value); if(id>=0) level.updateNode(id,{isStart:true}); level.d.startNode=id; refNodeList(); });
  document.getElementById('m-home').addEventListener('change',e=>{ const id=parseInt(e.target.value); if(id>=0) level.updateNode(id,{isHome:true}); level.d.homeNode=id; refNodeList(); });
}

// 标签页
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

// ══════════════════════════════════════════════
//  导出 / 导入
// ══════════════════════════════════════════════
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

document.getElementById('btn-export').addEventListener('click',()=>{
  navigator.clipboard.writeText(JSON.stringify(level.toJSON(),null,2)).then(()=>toast('✅ JSON 已复制到剪贴板！')).catch(()=>toast('⚠️ 复制失败'));
});
document.getElementById('btn-import').addEventListener('click',()=>{ document.getElementById('import-modal').classList.add('show'); document.getElementById('import-text').value=''; });
document.getElementById('import-cancel').addEventListener('click',()=>{ document.getElementById('import-modal').classList.remove('show'); });
document.getElementById('import-confirm').addEventListener('click',()=>{
  try{
    level.fromJSON(JSON.parse(document.getElementById('import-text').value.trim()));
    select(null); updateAll(); redraw();
    document.getElementById('import-modal').classList.remove('show');
    toast('✅ JSON 导入成功！');
  } catch(e){ toast('❌ JSON 格式错误'); }
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ document.getElementById('import-modal').classList.remove('show'); document.getElementById('type-popup').classList.remove('show'); }
});
</script>
